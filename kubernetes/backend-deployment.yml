apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-backend
  labels:
    app: todo-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: todo-backend

  template:
    metadata:
      labels:
        app: todo-backend

    spec:
      containers:
      - name: todo-backend

        image: 276719381991.dkr.ecr.ap-south-1.amazonaws.com/backend/dev
        imagePullPolicy: Always

        ports:
        - containerPort: 3500

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"