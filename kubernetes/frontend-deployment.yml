apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 1
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 276719381991.dkr.ecr.ap-south-1.amazonaws.com/dev/my-frontend:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 80