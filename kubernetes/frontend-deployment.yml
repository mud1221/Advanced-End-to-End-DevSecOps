apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-frontend
  labels:
    app: todo-frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: todo-frontend

  template:
    metadata:
      labels:
        app: todo-frontend

    spec:
      containers:
      - name: todo-frontend

        image: 276719381991.dkr.ecr.ap-south-1.amazonaws.com/frontend/dev
        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"