version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"

    volumes:
      - mongodb-data:/data/db

    networks:
      - todo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend

    restart: always

    ports:
      - "3500:3500"

    environment:
      MONGO_CONN_STR: mongodb://mongodb:27017/todo

    depends_on:
      - mongodb

    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        REACT_APP_BACKEND_URL: http://backend:3500

    container_name: frontend

    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - todo-network

volumes:
  mongodb-data:

networks:
  todo-network:
    driver: bridge